name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  SASE_PYTHON_REF: master
  SASE_PYTHON_PATH: .ci/sase
  SASE_RUST_CORE_REF: master
  SASE_RUST_CORE_PATH: .ci/sase-core

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out SASE
        uses: actions/checkout@v4
        with:
          repository: sase-org/sase
          ref: ${{ env.SASE_PYTHON_REF }}
          path: ${{ env.SASE_PYTHON_PATH }}
      - name: Check out SASE Rust core
        uses: actions/checkout@v4
        with:
          repository: sase-org/sase-core
          ref: ${{ env.SASE_RUST_CORE_REF }}
          path: ${{ env.SASE_RUST_CORE_PATH }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        run: |
          uv python install 3.12
          uv venv --python 3.12 .venv
      - name: Install dependencies
        run: just install
      - name: Lint
        run: just lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Check out SASE
        uses: actions/checkout@v4
        with:
          repository: sase-org/sase
          ref: ${{ env.SASE_PYTHON_REF }}
          path: ${{ env.SASE_PYTHON_PATH }}
      - name: Check out SASE Rust core
        uses: actions/checkout@v4
        with:
          repository: sase-org/sase-core
          ref: ${{ env.SASE_RUST_CORE_REF }}
          path: ${{ env.SASE_RUST_CORE_PATH }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up Python ${{ matrix.python-version }}
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv --python ${{ matrix.python-version }} .venv
      - name: Install dependencies
        run: just install
      - name: Run tests
        run: just test
