tags: rollover

input:
  - name: name
    type: word

steps:
  - name: create_branch
    bash: |
      set -eu
      BRANCH="{{ name }}"
      git fetch origin 2>&1 || true
      # Prefer checkout (auto-tracks remote if it exists) over checkout -b
      git checkout "$BRANCH" 2>&1 || git checkout -b "$BRANCH" 2>&1
      # Sync with remote if the branch already exists there
      git pull origin "$BRANCH" 2>&1 || true
      git push -u origin "$BRANCH" 2>&1
      CURRENT_BRANCH=$(git branch --show-current)
      if [ "$CURRENT_BRANCH" != "$BRANCH" ]; then
        echo "error=Expected current branch '$BRANCH' but found '$CURRENT_BRANCH'" >&2
        exit 1
      fi
      echo "branch_name=$BRANCH"
      echo "meta_changespec=$BRANCH"
    output:
      branch_name: word

  - name: inject
    prompt_part: ""

  - name: create_changespec
    hidden: true
    python: |
      from sase_github.scripts.pr_create_changespec import main
      main(
          name={{ name | tojson }},
          prompt={{ _prompt | tojson }},
          response={{ _response | tojson }},
      )
    output:
      success: bool
      cl_name: word
      project_file: path
      default_branch: word
      branch_name: word

  - name: agent_info
    hidden: true
    python: |
      import json
      import os
      from pathlib import Path

      agent_name = ""
      model = ""
      llm_provider = ""

      artifacts_dir = os.environ.get("SASE_ARTIFACTS_DIR", "")
      if artifacts_dir:
          meta_path = Path(artifacts_dir) / "agent_meta.json"
          try:
              with open(meta_path, encoding="utf-8") as f:
                  meta = json.load(f)
              agent_name = meta.get("name", "")
              model = meta.get("model", "")
              llm_provider = meta.get("llm_provider", "")
          except (FileNotFoundError, json.JSONDecodeError, OSError):
              pass

      print(f"agent_name={agent_name}")
      print(f"model={model}")
      print(f"llm_provider={llm_provider}")
    output:
      agent_name: word
      model: word
      llm_provider: word

  - name: create_pr
    hidden: true
    if: "{{ create_changespec.success | default(false) }}"
    bash: |
      BRANCH="{{ create_changespec.branch_name | default(create_branch.branch_name) }}"
      DEFAULT_BRANCH="{{ create_changespec.default_branch }}"

      # Check for existing PR first
      EXISTING_URL=$(gh pr view "$BRANCH" --json url --jq '.url' 2>/dev/null || echo "")
      if [ -n "$EXISTING_URL" ]; then
        echo "pr_url=$EXISTING_URL"
        echo "success=true"
        exit 0
      fi

      # Push the agent's commits before creating the PR.
      # The create_branch pre-step pushes the branch before the agent runs,
      # so the remote is stale. gh pr create's auto-push is unreliable in
      # non-interactive subprocess mode, so we push explicitly.
      git push origin "$BRANCH" 2>&1 || true

      # Get PR title and body from first commit on the branch
      FIRST_COMMIT=$(git log --format='%H' "origin/$DEFAULT_BRANCH".."$BRANCH" 2>/dev/null | tail -1)
      if [ -n "$FIRST_COMMIT" ]; then
        PR_TITLE=$(git log --format='%s' -1 "$FIRST_COMMIT")
        PR_BODY=$(git log --format='%b' -1 "$FIRST_COMMIT" | sed -e :a -e '/^[[:space:]]*$/d;N;ba')
      fi
      if [ -z "$PR_TITLE" ]; then
        PR_TITLE="Agent changes on branch $BRANCH"
      fi
      if [ -z "$PR_BODY" ]; then
        PR_BODY="Automated PR from sase."
      fi

      # Append agent metadata footer
      AGENT_NAME="{{ agent_info.agent_name | default('') }}"
      MODEL="{{ agent_info.model | default('') }}"
      LLM_PROVIDER="{{ agent_info.llm_provider | default('') }}"
      FOOTER=""
      if [ -n "$LLM_PROVIDER" ] && [ -n "$MODEL" ]; then
        FOOTER="**Model:** \`${LLM_PROVIDER}/${MODEL}\`"
      fi
      if [ -n "$AGENT_NAME" ]; then
        if [ -n "$FOOTER" ]; then
          FOOTER=$(printf '%s\n**Agent:** `%s`' "$FOOTER" "$AGENT_NAME")
        else
          FOOTER="**Agent:** \`${AGENT_NAME}\`"
        fi
      fi
      if [ -n "$FOOTER" ]; then
        PR_BODY=$(printf '%s\n\n---\n%s' "$PR_BODY" "$FOOTER")
      fi

      PR_OUTPUT=$(gh pr create \
        --base "$DEFAULT_BRANCH" \
        --head "$BRANCH" \
        --title "$PR_TITLE" \
        --body "$PR_BODY" 2>&1) || true

      # Extract the URL from gh output (may contain push progress on other lines)
      PR_URL=$(echo "$PR_OUTPUT" | grep -o 'https://[^ ]*' | head -1)

      if [ -n "$PR_URL" ]; then
        echo "pr_url=$PR_URL"
        echo "success=true"
      else
        echo "pr_url="
        echo "success=false"
        echo "error=$PR_OUTPUT"
      fi
    output: { pr_url: line, success: bool }

  - name: update_cl
    hidden: true
    if: "{{ create_pr.success | default(false) }}"
    python: |
      from sase.status_state_machine import update_changespec_cl_atomic

      project_file = {{ create_changespec.project_file | tojson }}
      cl_name = {{ create_changespec.cl_name | tojson }}
      pr_url = {{ create_pr.pr_url | tojson }}

      if pr_url and pr_url.startswith("http"):
          update_changespec_cl_atomic(project_file, cl_name, pr_url)
          print("updated=true")
          print(f"pr_url={pr_url}")
          print(f"meta_new_pr={pr_url}")
      else:
          print("updated=false")
          print(f"pr_url={pr_url}")
    output: { updated: bool, pr_url: line, meta_new_pr: line }
