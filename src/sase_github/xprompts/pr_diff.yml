tags: diff_file

steps:
  - name: detect_base
    bash: |
      ref=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null || echo "refs/remotes/origin/master")
      branch=$(echo "$ref" | sed 's|refs/remotes/||')
      echo "base=$branch"
    output: { base: word }

  - name: content
    prompt_part: |
      #x(pr_changes.diff, git diff {{ detect_base.base }}...HEAD)
