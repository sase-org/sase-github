wraps_all: true

input:
  - name: gh_ref
    type: word
  - name: n
    type: int
    default: null
  - name: release
    type: bool
    default: true
  - name: workflow_label
    type: word
    default: null

steps:
  - name: setup
    python: |
      from sase_github.scripts.gh_setup import main
      main(
          gh_ref={{ gh_ref | tojson }},
          n={{ n | tojson }},
          release={{ release | tojson }},
          workflow_label={{ workflow_label | tojson }},
      )
    output:
      project_name: word
      project_file: path
      workspace_dir: path
      workspace_num: int
      checkout_target: word
      primary_workspace_dir: path
      should_release: bool
      workflow_name: word

  - name: prepare
    bash: |
      # Stash any uncommitted changes (including untracked files)
      if ! git diff --quiet HEAD 2>/dev/null || [ -n "$(git ls-files --others --exclude-standard)" ]; then
        git stash push --include-untracked -m "gh-workflow-$(date +%s)" --quiet
        echo "stashed=true"
      else
        echo "stashed=false"
      fi
      git fetch origin --quiet 2>&1 || true
      echo "success=true"
    output: { success: bool, stashed: bool }

  - name: checkout
    python: |
      import os
      import subprocess
      import sys

      from sase.vcs_provider import get_vcs_provider

      checkout_target = {{ setup.checkout_target | tojson }}
      project_name = {{ setup.project_name | tojson }}
      gh_ref = {{ gh_ref | tojson }}

      provider = get_vcs_provider(os.getcwd())

      # Checkout the CL branch so that subsequent diffs are relative to the
      # CL tip rather than the default branch.  Try checkout_target first
      # (works for default-branch refs like origin/main), then fall back to
      # ChangeSpec name -> branch name conversion.
      is_changespec = checkout_target == f"origin/{gh_ref}"
      ok, err = provider.checkout(checkout_target, os.getcwd())
      if not ok:
          if is_changespec:
              # ChangeSpec ref — resolve name to branch name
              resolved = provider.resolve_revision(
                  gh_ref, project_name, os.getcwd()
              )
              ok, err = provider.checkout(resolved, os.getcwd())
          else:
              # Project/repo ref — try common default branch names
              for fallback in ["master", "main"]:
                  ok, err = provider.checkout(fallback, os.getcwd())
                  if ok:
                      break
          if not ok:
              print(
                  f"Warning: checkout failed: {err}",
                  file=sys.stderr,
              )

      # Sync with remote after checkout
      subprocess.run(
          ["git", "pull", "--rebase", "--quiet"],
          capture_output=True,
          text=True,
          check=False,
      )

      # Record HEAD for the diff step
      result = subprocess.run(
          ["git", "rev-parse", "HEAD"],
          capture_output=True,
          text=True,
          check=False,
      )
      head = result.stdout.strip() if result.returncode == 0 else ""
      print(f"head_before={head}")
      print("success=true")
    output: { success: bool, head_before: word }

  - name: inject
    prompt_part: ""

  - name: release
    if: "{{ setup.should_release }}"
    python: |
      from sase.running_field import release_workspace

      release_workspace(
          {{ setup.project_file | tojson }},
          {{ setup.workspace_num }},
          {{ setup.workflow_name | tojson }},
          {{ gh_ref | tojson }} if "/" not in {{ gh_ref | tojson }} else None,
      )
      print("released=true")
    output: { released: bool }

  - name: diff
    bash: |
      head_before="{{ checkout.head_before }}"
      if [ -z "$head_before" ]; then
        exit 0
      fi
      head_now=$(git rev-parse HEAD)
      diff_file=$(mktemp /tmp/sase-gh-XXXXXX.diff)
      if [ "$head_now" != "$head_before" ]; then
        # Commits were made — show only the last commit's diff
        git diff HEAD~1 HEAD > "$diff_file" 2>/dev/null
        commit_msg=$(git log -1 --format='%s' HEAD)
        echo "meta_commit_message=$commit_msg"
      else
        # No commits — show uncommitted changes
        git diff HEAD > "$diff_file" 2>/dev/null
        git ls-files --others --exclude-standard -z 2>/dev/null \
          | while IFS= read -r -d '' f; do
              git diff --no-index /dev/null "$f" 2>/dev/null
            done >> "$diff_file"
      fi
      if [ -s "$diff_file" ]; then
        echo "diff_path=$diff_file"
      else
        rm -f "$diff_file"
      fi
    output: { diff_path: path, meta_commit_message: line }
